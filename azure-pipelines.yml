trigger:
- main

pool:
  name: 'MyLocalPool'
  demands: 
    - agent.name -equals DINODAN

variables:
  # Conecta con el grupo que creaste en Pipelines > Library
  - group: 'API-Secrets' 
  - name: buildConfiguration
    value: 'Release'
  # Nombre de la conexión que creaste en Service Connections
  - name: dockerRegistryServiceConnection
    value: 'DockerHub-Conn' 
  # Tu usuario de DockerHub y el nombre de la imagen
  - name: imageRepository
    value: 'daneduardo/product-api' 
  - name: tag
    value: '$(Build.BuildId)'

stages:
- stage: BuildAndTest
  displayName: 'Build and Test Stage'
  jobs:
  - job: Build
    displayName: 'Build and Unit Tests'
    steps:
    # 1. Instalar SDK de .NET 9
    - task: UseDotNet@2
      displayName: 'Use .NET 9 SDK'
      inputs:
        packageType: 'sdk'
        version: '9.x'

    # 2. Restaurar dependencias
    - task: DotNetCoreCLI@2
      displayName: 'Restore Dependencies'
      inputs:
        command: 'restore'
        projects: '**/*.csproj'

    # 3. Ejecutar Pruebas (xUnit)
    - task: DotNetCoreCLI@2
      displayName: 'Run Unit Tests'
      inputs:
        command: 'test'
        projects: '**/*Tests/*.csproj'
        arguments: '--configuration $(buildConfiguration) --logger trx'
        publishTestResults: true

    # 4. Construir y Publicar Imagen a DockerHub
    - task: Docker@2
      displayName: 'Build and Push Docker Image'
      inputs:
        command: 'buildAndPush'
        repository: $(imageRepository)
        dockerfile: '**/Dockerfile'
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: BuildAndTest
  condition: succeeded()
  jobs:
  - job: DeployToContainerApp
    displayName: 'Deploy to Azure Container Apps'
    steps:
    # 5. Despliegue automático (Cumple requerimiento CI/CD)
    - task: AzureContainerApps@1
      displayName: 'Deploy to Container App'
      inputs:
        azureSubscription: 'Azure-Service-Conn'
        containerAppName: 'products-api-app'
        resourceGroup: 'rg-products-prod'
        imageToDeploy: '$(imageRepository):$(tag)'
        # Inyectamos las variables de la Library al contenedor
        envVars: |
          AzureAd__ClientId=$(AzureAd__ClientId)
          AzureAd__TenantId=$(AzureAd__TenantId)
          ConnectionStrings__DefaultConnection=$(Prod_Db_Connection)
