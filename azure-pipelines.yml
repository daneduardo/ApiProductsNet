trigger:
  - main

pool:
  name: "MyLocalPool"
  demands:
    - agent.name -equals DINODAN

variables:
  - group: "API-Secrets"
  - name: buildConfiguration
    value: "Release"
  - name: dockerRegistryServiceConnection
    value: "DockerHub-Conn"
  - name: imageRepository
    value: "danieleduardoperez/product-api"
  - name: tag
    value: "$(Build.BuildId)"

stages:
  - stage: BuildAndTest
    displayName: "Build and Test Stage"
    jobs:
      - job: Build
        displayName: "Build and Unit Tests"
        steps:
          - task: UseDotNet@2
            displayName: "Use .NET 9 SDK"
            inputs:
              packageType: "sdk"
              version: "9.x"

          - task: DotNetCoreCLI@2
            displayName: "Restore Dependencies"
            inputs:
              command: "restore"
              projects: "**/*.csproj"

          - task: DotNetCoreCLI@2
            displayName: "Run Unit Tests"
            inputs:
              command: "test"
              projects: "**/*Tests/*.csproj"
              arguments: "--configuration $(buildConfiguration) --logger trx"
              publishTestResults: true

          - task: Docker@2
            displayName: "Build and Push Docker Image"
            inputs:
              command: "buildAndPush"
              repository: $(imageRepository)
              dockerfile: "**/Dockerfile"
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
                latest

  - stage: Deploy
    displayName: "Deploy to Azure"
    dependsOn: BuildAndTest
    condition: succeeded()
    jobs:
      - job: DeployToContainerApp
        displayName: "Deploy to Azure Container Apps"
        steps:
          # TAREA 1: Instalación de Azure CLI (Corregida)
          - task: PowerShell@2
            displayName: "Install Azure CLI (if needed)"
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "=========================================="
                Write-Host "Checking Azure CLI installation..."
                Write-Host "=========================================="
                
                try {
                  az --version 2>$null
                  if ($LASTEXITCODE -eq 0) {
                    Write-Host "✅ Azure CLI is already installed"
                    exit 0
                  }
                } catch {
                  Write-Host "⚠️ Azure CLI not found in PATH"
                }
                
                Write-Host "⚙️ Installing Azure CLI..."
                $installerUrl = "https://aka.ms/installazurecliwindowsx64"
                $installerPath = "$env:TEMP\AzureCLI.msi"
                
                Write-Host "📥 Downloading..."
                Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath -UseBasicParsing
                
                Write-Host "📦 Executing MSI..."
                $installProcess = Start-Process msiexec.exe -Wait -PassThru -ArgumentList "/i `"$installerPath`" /quiet /norestart"
                
                if ($installProcess.ExitCode -eq 0) {
                  Write-Host "✅ Azure CLI installed successfully"
                  $azureCLIPath = "C:\Program Files\Microsoft SDKs\Azure\CLI2\wbin"
                  if (Test-Path $azureCLIPath) {
                    $env:PATH = "$azureCLIPath;$env:PATH"
                    Write-Host "✅ Added to PATH"
                  }
                } else {
                  Write-Host "❌ Installation failed with code: $($installProcess.ExitCode)"
                  exit 1
                }
              errorActionPreference: 'stop'
              failOnStderr: false

          # TAREA 2: Despliegue (Corregida)
          - task: AzureCLI@2
            displayName: 'Deploy to Container App via CLI'
            inputs:
              azureSubscription: 'Azure-Service-Conn'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              inlineScript: |
                Write-Host "🚀 Starting Deployment..."
                
                $DB_CONN = "$(Prod_Db_Connection)"
                
                if ([string]::IsNullOrWhiteSpace($DB_CONN)) {
                  Write-Host "❌ Error: Database connection string is empty!"
                  exit 1
                }
                
                # Ejecutar el deploy con az containerapp up
                az containerapp up `
                  --name products-api `
                  --resource-group rg-products-prod `
                  --environment env-products-prod `
                  --image danieleduardoperez/product-api:latest `
                  --target-port 8080 `
                  --ingress external `
                  --env-vars "AzureAd__ClientId=" "AzureAd__TenantId=" "ConnectionStrings__DefaultConnection=$DB_CONN"
                
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "❌ Deployment failed"
                  exit 1
                }
                
                Write-Host "✅ DEPLOYMENT SUCCESSFUL!"
